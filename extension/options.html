<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      min-width: 320px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #202124;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      box-sizing: border-box;
    }
    input:focus {
      outline: none;
      border-color: #4285F4;
    }
    .status {
      font-size: 12px;
      color: #0f9d58;
      margin-top: 8px;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <label for="apiHost">API Server URL</label>
  <input type="url" id="apiHost" placeholder="http://localhost:9090">
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
