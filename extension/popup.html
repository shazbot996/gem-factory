<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Roboto, sans-serif;
      width: 380px;
      max-height: 500px;
      overflow-y: auto;
      background: #fff;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #202124;
    }

    .header .count {
      font-size: 12px;
      color: #5f6368;
      background: #f1f3f4;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: #5f6368;
      font-size: 13px;
      line-height: 1.5;
    }

    .empty .hint {
      margin-top: 8px;
      font-size: 12px;
      color: #9aa0a6;
    }

    .gem-list {
      list-style: none;
    }

    .gem-item {
      padding: 10px 16px;
      border-bottom: 1px solid #f1f3f4;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .gem-item:last-child {
      border-bottom: none;
    }

    .gem-info {
      flex: 1;
      min-width: 0;
    }

    .gem-name {
      font-size: 13px;
      font-weight: 500;
      color: #202124;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gem-meta {
      font-size: 11px;
      color: #9aa0a6;
      margin-top: 2px;
    }

    .gem-preview {
      font-size: 11px;
      color: #5f6368;
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .gem-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: #9aa0a6;
      padding: 4px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }

    .gem-delete:hover {
      background: #fce8e6;
      color: #d93025;
    }

    .gem-delete svg {
      width: 14px;
      height: 14px;
    }

    .footer {
      padding: 10px 16px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      position: sticky;
      bottom: 0;
      background: #fff;
    }

    .footer button {
      font-family: 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: background 0.1s;
    }

    .btn-clear {
      background: #f1f3f4;
      color: #3c4043;
    }

    .btn-clear:hover {
      background: #e8eaed;
    }

    .btn-export {
      background: #4285F4;
      color: white;
    }

    .btn-export:hover {
      background: #3367d6;
    }

    .btn-save {
      background: #0f9d58;
      color: white;
      flex: 1;
    }

    .btn-save:hover {
      background: #0b8043;
    }

    .btn-save:disabled {
      background: #a8dab5;
      cursor: default;
    }

    .settings {
      padding: 10px 16px;
      border-bottom: 1px solid #e0e0e0;
      background: #f8f9fa;
    }

    .settings label {
      font-size: 11px;
      font-weight: 500;
      color: #5f6368;
      display: block;
      margin-bottom: 4px;
    }

    .settings input {
      width: 100%;
      font-family: 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      padding: 5px 8px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      outline: none;
    }

    .settings input:focus {
      border-color: #4285F4;
    }

    .settings-row {
      margin-bottom: 6px;
    }

    .settings-row:last-child {
      margin-bottom: 0;
    }

    .status-msg {
      font-size: 11px;
      padding: 6px 16px;
      text-align: center;
    }

    .status-msg.success {
      background: #e6f4ea;
      color: #137333;
    }

    .status-msg.error {
      background: #fce8e6;
      color: #c5221f;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Gem Factory</h1>
    <span class="count" id="count">0 gems</span>
  </div>
  <div class="settings">
    <div class="settings-row">
      <label for="api-url">API Server URL</label>
      <input type="text" id="api-url" placeholder="http://localhost:9090">
    </div>
    <div class="settings-row">
      <label for="user-email">Your Email</label>
      <input type="email" id="user-email" placeholder="you@example.com">
    </div>
  </div>
  <div id="status"></div>
  <div id="content"></div>
  <script src="popup.js"></script>
</body>
</html>
